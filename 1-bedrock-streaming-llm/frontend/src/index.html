<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <title>Bedrock Chatbot</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #31394d; border-radius: 10px; }
    .glass-input {
      background: rgba(45, 52, 73, 0.4);
      backdrop-filter: blur(20px);
    }
    app-root { display: flex; height: 100%; }
    .nav-active { color: #bac3ff !important; background: #222a3d !important; }
    @keyframes blink { 50% { opacity: 0; } }
    .cursor-blink { animation: blink 0.7s step-end infinite; }
  </style>
</head>
<body class="bg-[#0b1326] text-[#dae2fd] h-screen overflow-hidden">
  <app-root></app-root>
</body>
</html>
